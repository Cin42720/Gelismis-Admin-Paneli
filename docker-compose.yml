services:
  mysql:
    image: mysql:8.4
    container_name: final-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_panel}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-admin123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: final-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: final-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: final-backend
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  worker:
    build: ./worker
    container_name: final-worker
    restart: unless-stopped
    env_file:
      - .env.example
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    container_name: final-ai-service
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "8100:8100"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: final-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "3001:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  mysql_data:
